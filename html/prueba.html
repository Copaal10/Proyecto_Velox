 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Proyecto Velox</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Google Fonts: Orbitron -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS personalizado -->
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<style>
    .password-requirements {
  list-style: none;
  padding-left: 0;
  font-size: 14px;
}

.password-requirements li {
  margin-bottom: 3px;
  transition: color 0.3s;
}

.password-requirements .valid {
  color: green;
  font-weight: bold;
}

.password-requirements .invalid {
  color: red;
}

</style>
  <!-- Header -->
  <header>
    <h1>Proyecto Velox</h1>
    <h4>Acceso seguro</h4>
  </header>

<!-- contenedor registro -->
<div class="card shadow flex-fill">
  <div class="card-body">
    <h3 class="text-center mb-3">Registro</h3>
    <form id="formRegistro">

      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="nombre" required>
      </div>

      <div class="mb-3">
        <label for="correoRegistro" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="correoRegistro" required>
      </div>

      <div class="mb-3">
        <label for="telefono" class="form-label">Número telefónico</label>
        <input type="tel" class="form-control" id="telefono" required>
      </div>

      <!-- CONTRASEÑA con requisitos -->
      <div class="mb-3">
        <label for="passwordRegistro" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="passwordRegistro" required>

        <!-- Lista de requisitos -->
        <ul class="password-requirements mt-2">
          <li id="req-length" class="invalid">Mínimo 8 caracteres</li>
          <li id="req-upper" class="invalid">Al menos una mayúscula</li>
          <li id="req-number" class="invalid">Al menos un número</li>
        </ul>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
        <input type="password" class="form-control" id="confirmPassword" required>
      </div>

      <button type="submit" class="btn btn-success w-100">Registrarse</button>
    </form>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Enlazar script -->
 <script src="../script/validacion.js"
<script src="../script/script.js"></script> <!-- asegúrate de la ruta -->
</body>
</html>
